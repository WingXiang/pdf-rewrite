name: Sync to Hugging Face Hub

on:
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Remove large files (PDFs) from the current workspace before deploying
          find . -name "*.pdf" -type f -delete
          
          # Create a fresh git repo to wipe history and avoid 10MB limit on old commits
          rm -rf .git
          git init
          git checkout -b main
          git add .
          git commit -m "Deploy to HF Spaces"
          
          # Force push the fresh repo to Hugging Face
          git remote add huggingface https://wingxiang:$HF_TOKEN@huggingface.co/spaces/wingxiang/pdf-rewrite-backend
          git push huggingface main -f
