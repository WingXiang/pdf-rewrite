name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Prepare static files
        run: |
          mkdir -p public
          # Copy the static folder contents to public
          # Also, if index.html is inside static, it needs to be at the root of the site
          cp -r static/* public/
          
          # Ensure there is an index.html at the root of public/
          if [ -f "public/index.html" ]; then
            echo "index.html found"
          else
            echo "Error: static/index.html not found!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
